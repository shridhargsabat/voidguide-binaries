<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Squircle -->
  <rect width="512" height="512" rx="112" fill="#050505"/>
  <rect x="12" y="12" width="488" height="488" rx="104" fill="url(#paint0_linear)"/>
  
  <!-- Subtle Inner Glow -->
  <rect x="24" y="24" width="464" height="464" rx="92" stroke="white" stroke-opacity="0.05" stroke-width="2"/>

  <!-- The Void/Portal Element -->
  <circle cx="256" cy="256" r="180" fill="url(#paint1_radial)" fill-opacity="0.3"/>
  
  <!-- The 'V' - Void Path -->
  <path d="M140 160C140 160 180 380 256 380C332 380 372 160 372 160" stroke="url(#paint2_linear)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- The 'Guide' Spark -->
  <g filter="url(#filter0_f)">
    <circle cx="256" cy="380" r="12" fill="#8878FF"/>
  </g>
  <circle cx="256" cy="380" r="6" fill="white"/>

  <!-- Star Details -->
  <circle cx="110" cy="110" r="2" fill="white" fill-opacity="0.4"/>
  <circle cx="400" cy="400" r="1.5" fill="white" fill-opacity="0.3"/>
  <circle cx="430" cy="120" r="2.5" fill="#8878FF" fill-opacity="0.5"/>
  <circle cx="90" cy="380" r="1.5" fill="white" fill-opacity="0.2"/>

  <defs>
    <filter id="filter0_f" x="224" y="348" width="64" height="64" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="10" result="effect1_foregroundBlur"/>
    </filter>
    
    <linearGradient id="paint0_linear" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1A1C"/>
      <stop offset="1" stop-color="#0A0A0B"/>
    </linearGradient>

    <radialGradient id="paint1_radial" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 256) rotate(90) scale(180)">
      <stop stop-color="#8878FF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#8878FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="paint2_linear" x1="256" y1="160" x2="256" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8878FF"/>
      <stop offset="1" stop-color="#6E5ED9"/>
    </linearGradient>
  </defs>
</svg>
